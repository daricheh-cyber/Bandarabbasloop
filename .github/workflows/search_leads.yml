name: Search Bandar Abbas Billboard Leads

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-search-results gspread google-auth

      - name: Run search
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python search_leads.py

      - name: Commit results
        run: |
          git config --global user.name 'Billboard Leads Bot'
          git config --global user.email 'bot@github.com'
          git add leads.csv
          git diff --staged --quiet || git commit -m "leads - $(date '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
